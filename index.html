<style>
.form-box {
    width: 400px;
    background: #f2f2f2;
    padding: 20px;
    border-radius: 8px;
}
.form-box input, .form-box select, .form-box button {
    width: 100%;
    padding: 8px;
    margin-top: 10px;
}
.form-box button {
    background: #2c7be5;
    color: white;
    border: none;
}
</style>

<div class="form-box">
<form onsubmit="showMsg(); return false;">
    <h3>Student Placement Registration</h3>

    <label>Student Name</label>
    <input type="text" required>

    <label>USN</label>
    <input type="text" required>

    <label>Email</label>
    <input type="email" required>

    <label>Department</label>
    <select>
        <option>CSE</option>
        <option>ISE</option>
        <option>ECE</option>
        <option>EEE</option>
    </select>

    <label>CGPA</label>
    <input type="number" step="0.01">

    <button type="submit">Register</button>
</form>

<p id="msg" style="color:green; display:none;">
Registration successful!
</p>
</div>

<script>
function showMsg() {
    document.getElementById("msg").style.display = "block";
}
</script>
